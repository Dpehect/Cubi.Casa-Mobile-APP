name: cubicasa_flutter
description: A professional floor plan creation app for real estate, insurance & appraisals.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  
  # API & HTTP
  dio: ^5.3.0
  http: ^1.1.0
  
  # Database
  sqflite: ^2.3.0
  sembast: ^3.4.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  get_storage: ^2.1.0
  
  # Navigation & Routing
  go_router: ^10.0.0
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  
  # Image Processing & Camera
  image_picker: ^0.8.9
  camera: ^0.10.5
  flutter_image_compress: ^0.0.99
  
  # PDF & File Export
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # 3D Visualization
  three_dart: ^0.0.0
  model_viewer: ^1.0.0
  
  # Maps
  google_maps_flutter: ^2.5.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.0
  get: ^4.6.0
  
  # Internationalization
  easy_localization: ^3.0.0
  
  # Animation
  flutter_staggered_animations: ^1.1.0
  
  # Charts (for statistics)
  fl_chart: ^0.65.0
  
  # QR & Scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.0
  
  # JSON serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0
  
  # Video player
  video_player: ^2.8.0
  
  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  google_sign_in: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  
  # Testing
  mockito: ^5.4.0
  bloc_test: ^9.1.0
  
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
    - assets/fonts/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
